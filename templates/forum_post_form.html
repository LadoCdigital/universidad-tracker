{% extends "base.html" %}
{% block content %}
<h1>Responder a: {{ topic.title }}</h1>
<form method="POST">
    {{ form.hidden_tag() }}
    <div class="mb-3">
        {{ form.content.label(class="form-label") }}
        {{ form.content(class="form-control", rows=5) }}
    </div>
    <button type="submit" class="btn btn-primary">Publicar</button>
    <a href="{{ url_for('view_topic', id=topic.id) }}" class="btn btn-secondary">Cancelar</a>
</form>
{% endblock %}
