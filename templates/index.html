{% extends "base.html" %}
{% block content %}
<div class="jumbotron">
    <h1>Bienvenido a Universidad Tracker</h1>
    <p>Gestiona tu carrera de medicina o enfermería: materias, exámenes, materiales, tareas y más.</p>
    {% if not current_user.is_authenticated %}
        <a href="{{ url_for('login') }}" class="btn btn-primary">Iniciar sesión</a>
        <a href="{{ url_for('register') }}" class="btn btn-secondary">Registrarse</a>
    {% else %}
        <a href="{{ url_for('dashboard') }}" class="btn btn-success">Ir al Dashboard</a>
    {% endif %}
</div>
{% endblock %}
